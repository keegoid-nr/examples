AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Each example has its own template.yaml. Navigate to the src/ subdirectory for
  the example you want to deploy, then run sam build && sam deploy --guided.

  Examples:
    src/python311sqs/        - Python 3.11 with SQS trigger (CloudWatch shipping)
    src/python311eventbridge/ - Python 3.11 with EventBridge trigger (CloudWatch shipping)
    src/python312/            - Python 3.12 with custom attribute and event (extension shipping)
    src/python310dynamodb/    - Python 3.10 writing to DynamoDB (extension shipping)

  Standalone subdirectories (each has its own deploy.sh and samconfig.toml):
    apm-mode/                 - Python Lambda in APM mode
    timeout-testing/          - Request and runtime timeout reproduction
